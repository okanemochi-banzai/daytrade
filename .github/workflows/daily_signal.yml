name: Daily Kiriban Signal

on:
  schedule:
    # 平日毎朝 8:40 JST (= 23:40 UTC 前日)
    - cron: "40 23 * * 0-4"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".github/workflows/**"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-signal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python tests/test_kiriban.py

      - name: Generate signal dashboard
        run: python src/main.py

      - name: Commit dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --quiet --cached || git commit -m "chore: update signal dashboard"
          git push

  deploy-pages:
    needs: generate-signal
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs
      - id: deployment
        uses: actions/deploy-pages@v4
