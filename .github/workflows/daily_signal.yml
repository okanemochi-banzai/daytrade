name: Daily Kiriban Signal

on:
  schedule:
    # 平日毎朝 7:30 JST (= 22:30 UTC 前日)
    # GitHub Actionsのcronは数十分遅延することがあるため、寄付き(9:00)に余裕を持って設定
    - cron: "30 22 * * 0-4"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".github/workflows/**"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-signal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: |
          python tests/test_kiriban.py
          python tests/test_sector_mapping.py
          python tests/test_market_direction.py
          python tests/test_warnings_module.py
          python tests/test_market_context.py
          python tests/test_history.py
          python tests/test_stock_picks.py

      - name: Generate signal dashboard
        run: python src/main.py

      - name: Commit dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if ! git diff --quiet --cached; then
            git commit -m "chore: update signal dashboard"
            # コンフリクト時はローカル(今生成したファイル)を優先する
            git pull --rebase -X ours origin main || git rebase --abort
            git push
          fi

  deploy-pages:
    needs: generate-signal
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs
      - id: deployment
        uses: actions/deploy-pages@v4
